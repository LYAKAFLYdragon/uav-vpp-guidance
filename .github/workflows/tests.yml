name: Tests

on:
  push:
    branches: [main, "fix/**", "feature/**", "stage/**", "stage*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10"]

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tomli
          pip install -e ".[dev]"

      - name: Check Python syntax
        run: |
          python -m compileall src/uav_vpp_guidance tests scripts

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Critical scripts CLI smoke
        run: |
          python scripts/run_stage6g_guidance_limitation_probe.py --help
          python scripts/run_stage6g4_smoke_probes.py --help
          python scripts/run_stage6g_guidance_limitation_probe.py --dry-run --output-dir /tmp/stage6g_probe_dryrun

      - name: Check TOML/YAML syntax
        run: |
          python -c "
          import sys
          if sys.version_info >= (3, 11):
              import tomllib
          else:
              import tomli as tomllib
          tomllib.load(open('pyproject.toml', 'rb'))
          "
          python -c "import yaml; [yaml.safe_load(open(p)) for p in ['config/env.yaml','config/ppo.yaml','config/guidance.yaml']]"
