# Canonical guidance-law configuration
# This file is the single source of truth for the guidance law used in
# paper-safe experiments. It matches the implemented LOSRateGuidance
# (roll-rate / normal-overload / throttle command chain).

guidance:
  mode: los_rate

  # Tunable gains optimized by CEM. Must match config/canonical/gain_space.yaml.
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2

  # Fixed parameters (NOT optimized by CEM).
  params:
    distance_scale_m: 2000.0
    target_speed_mps: 250.0
    speed_error_scale_mps: 100.0
    base_throttle: 0.7
    base_nz: 1.0
    epsilon: 1.0e-9
    capture_radius_m: 50.0
    use_distance_aware_speed: true
    enable_internal_clip: true
    enable_internal_filter: false

    # Terminal boundary layer suppresses high-gain LOS commands near the VPP
    # to avoid the collision singularity in crossing geometries.
    terminal_boundary_layer:
      enabled: true
      R_dead_m: 500.0
      blend_scale: 125.0

  limits:
    nz_min: -2.0
    nz_max: 7.0
    roll_rate_min: -1.5
    roll_rate_max: 1.5
    throttle_min: 0.0
    throttle_max: 1.0

# Virtual pursuit point: canonical 3-D offset action space.
virtual_point:
  action_dim: 3
  anchor_mode: current_target
  return_info: true
  d_long_range: [-1500.0, 1500.0]
  d_lat_range: [-800.0, 800.0]
  d_vert_range: [-500.0, 500.0]
  smoothing_alpha: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0
