# Canonical reward configuration.
#
# Design: dense per-step mixture + terminal sparse events.
# This matches the implemented RewardCalculator; the "extreme sparse reward"
# description in earlier reports is obsolete.

reward:
  # Dense geometry terms
  w_range: 0.6
  w_angle: 0.9

  # Dense safety / feasibility terms
  w_safety: 3.0
  w_saturation: 0.5
  w_smooth: 0.2
  w_turn_rate: 0.5

  # Dense maneuver terms
  w_closing: 0.1
  w_alive: 0.02

  # Unused in canonical experiments (kept for backward config compatibility)
  w_energy: 0.0
  w_overshoot: 0.0
  w_boundary: 0.0

  # Scenario / shaping parameters
  boundary_range_m: 6000.0
  boundary_alt_min_m: 1000.0
  boundary_alt_max_m: 9000.0
  ideal_range_min: 700.0
  ideal_range_max: 1100.0
  max_heading_rate: 0.3
  min_altitude_m: 500.0

  # Terminal sparse events
  terminal_success: 400.0
  terminal_failure: -300.0
  terminal_crash: -600.0

  # Potential-based shaping (optional ablation; disabled in canonical runs)
  potential_based_shaping:
    enabled: false
    C: 0.001
    gamma: 0.99
