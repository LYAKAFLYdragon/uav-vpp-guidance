# Canonical Virtual Pursuit Point (VPP) action space.
#
# Frozen as a 3-D spatial offset:
#   action = [d_long, d_lat, d_vert]  (normalized to [-1, 1] by the policy)
#
# Deprecated: tau_pred (prediction horizon) and speed_bias are NOT part of the
# canonical action space. They remain in some legacy configs for backward
# compatibility but are ignored when action_dim == 3.

virtual_point:
  action_dim: 3
  anchor_mode: current_target
  return_info: true
  d_long_range: [-1500.0, 1500.0]  # longitudinal offset (m)
  d_lat_range: [-800.0, 800.0]     # lateral offset (m)
  d_vert_range: [-500.0, 500.0]   # vertical offset (m)
  smoothing_alpha: 0.3
