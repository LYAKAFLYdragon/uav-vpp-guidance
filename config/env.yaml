env:
  sim_freq: 60
  decision_freq: 5
  max_high_level_steps: 512
  use_jsbsim: true
  aircraft_model: f16
  legacy_project_root: ""

scenario:
  randomize_init: true
  types:
    - favorable
    - neutral
    - disadvantage
    - challenging

termination:
  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 12000.0
