# Experiment: Ablation - remove safety penalty from reward
experiment_name: "005_ablation_no_safety_penalty"
seed: 0

env:
  config_file: "config/env.yaml"

reward:
  config_file: "config/reward.yaml"
  w_safety: 0.0

guidance:
  config_file: "config/guidance.yaml"
  virtual_point:
    enabled: true

gain_optimizer:
  config_file: "config/gain_space.yaml"

ppo:
  config_file: "config/ppo.yaml"

bilevel:
  policy_training_iterations: 5
  timesteps_per_policy_iteration: 1_000_000
  gain_eval_episodes: 30
  log_dir: "experiments/005_ablation_no_safety_penalty/logs"
  checkpoint_dir: "experiments/005_ablation_no_safety_penalty/checkpoints"

output:
  acmi_dir: "experiments/005_ablation_no_safety_penalty/acmi"
  figure_dir: "experiments/005_ablation_no_safety_penalty/figures"
