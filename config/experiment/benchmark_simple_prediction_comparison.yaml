# Stage 6B: Simple-Backend Prediction Comparison Benchmark
#
# Phase: P6B
# Backend: simple (3DoF point mass)
# Purpose: Full benchmark comparing no_prediction, cv_prediction, and ca_prediction
#          on fixed scenarios with multiple seeds.
# Paper-grade: episodes=20, seeds=[0..4]
#
# Usage:
#   # Smoke (minimal, for CI)
#   python -m uav_vpp_guidance.evaluation.run_stage6b_simple_benchmark \
#       --config config/experiment/benchmark_simple_prediction_comparison.yaml --smoke
#
#   # Small run
#   python -m uav_vpp_guidance.evaluation.run_stage6b_simple_benchmark \
#       --config config/experiment/benchmark_simple_prediction_comparison.yaml \
#       --episodes 3 --seeds 0 1 --scenarios favorable neutral
#
#   # Full run
#   python -m uav_vpp_guidance.evaluation.run_stage6b_simple_benchmark \
#       --config config/experiment/benchmark_simple_prediction_comparison.yaml \
#       --episodes 20 --seeds 0 1 2 3 4

includes:
  - ../env.yaml
  - ../ppo.yaml
  - ../guidance.yaml
  - ../reward.yaml

experiment:
  name: stage6b_simple_prediction
  seed: 0
  mode: benchmark
  output_root: outputs/benchmark

env:
  backend: simple
  use_jsbsim: false
  decision_freq: 5
  sim_freq: 60
  max_high_level_steps: 512
  high_level_dt: 0.2
  target_mode: constant_velocity

  # Termination thresholds
  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 8000.0

methods:
  no_prediction:
    name: no_prediction
    trajectory_prediction:
      enabled: false
    virtual_point:
      anchor_mode: current_target
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

  cv_prediction:
    name: cv_prediction
    trajectory_prediction:
      enabled: true
      predictor_type: constant_velocity
      freeze_predictor_during_rl: true
      prediction:
        lookahead_time_s: 1.0
        output_mode: absolute_position
        fallback_mode: constant_velocity
      history:
        history_len: 5
        padding_mode: repeat_first
      model:
        input_dim: 16
    virtual_point:
      anchor_mode: predicted_target
      return_info: true
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

  ca_prediction:
    name: ca_prediction
    trajectory_prediction:
      enabled: true
      predictor_type: constant_acceleration
      freeze_predictor_during_rl: true
      prediction:
        lookahead_time_s: 1.0
        output_mode: absolute_position
        fallback_mode: constant_velocity
      history:
        history_len: 5
        padding_mode: repeat_first
      model:
        input_dim: 16
    virtual_point:
      anchor_mode: predicted_target
      return_info: true
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

guidance:
  mode: los_rate
  use_gain_adapter: false
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    alpha_filter: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0

reward:
  w_range: 0.5
  w_angle: 0.8
  w_energy: 0.2
  w_safety: 2.0
  w_saturation: 1.0
  w_smooth: 0.1
  terminal_success: 200.0
  terminal_failure: -200.0
  terminal_crash: -300.0
  min_altitude_m: 500.0

policy:
  type: mlp
  hidden_sizes: [128, 128]
  activation: tanh
  action_dim: 3
  action_low: [-1.0, -1.0, -1.0]
  action_high: [1.0, 1.0, 1.0]

# Default benchmark settings (overridable via CLI)
benchmark:
  episodes: 20
  seeds: [0, 1, 2, 3, 4]
  scenarios:
    - favorable
    - neutral
    - disadvantage
    - challenging

scenarios:
  favorable:
    name: favorable
    description: "Ego starts behind target at similar altitude with speed advantage."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0

  neutral:
    name: neutral
    description: "Ego and target start head-on at similar speed and altitude."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 180.0

  disadvantage:
    name: disadvantage
    description: "Target starts behind ego with speed advantage."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0
    target_init:
      position_m: [-2000.0, 0.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 0.0

  challenging:
    name: challenging
    description: "Target starts at high lateral offset with crossing trajectory."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 45.0
    target_init:
      position_m: [1500.0, 1500.0, 5200.0]
      velocity_mps: 210.0
      heading_deg: 225.0
