# ExpertVPP Baseline Experiment Configuration
#
# Rule-driven explainable baseline for close-range air combat tracking.
# Outputs normalized Δp compatible with VirtualPointGenerator.

includes:
  - ../env.yaml
  - ../ppo.yaml
  - ../guidance.yaml
  - ../reward.yaml

experiment:
  name: expert_vpp_baseline
  seed: 0
  mode: eval
  output_root: outputs

env:
  use_jsbsim: false
  decision_freq: 5
  sim_freq: 60
  max_high_level_steps: 512
  target_mode: constant_velocity

trajectory_prediction:
  enabled: false

virtual_point:
  anchor_mode: current_target
  action_dim: 3
  d_long_range: [-1500.0, 1500.0]
  d_lat_range: [-800.0, 800.0]
  d_vert_range: [-500.0, 500.0]
  smoothing_alpha: 0.3

guidance:
  mode: los_rate
  use_gain_adapter: false

training:
  total_steps: 10000
  rollout_steps: 512
  eval_interval: 2000
  save_interval: 5000

evaluation:
  episodes: 10
  scenario_types:
    - favorable
    - neutral
    - disadvantage
    - challenging

expert_vpp:
  enabled: true
  policy_type: expert_vpp_v0

  situation:
    strong_offensive_range_m: 1200.0
    offensive_range_m: 2500.0
    strong_offensive_aspect_deg: 30.0
    offensive_aspect_deg: 60.0
    defensive_aspect_deg: 120.0
    min_safe_altitude_m: 300.0
    min_safe_speed_mps: 80.0
    close_range_m: 700.0
    high_closure_rate_mps: 120.0
    r_desired_m: 900.0
    r_scale_m: 3000.0
    energy_scale: 1000000.0
    altitude_scale_m: 1000.0
    closure_scale_mps: 200.0

  weights:
    angle: 0.4
    range: 0.25
    energy: 0.2
    altitude: 0.1
    closure: 0.05

  action:
    pure_pursuit: [0.0, 0.0, 0.0]
    lead_pursuit: [0.5, 0.0, 0.0]
    lag_pursuit: [-0.5, 0.0, 0.0]
    high_angle_cut: [0.3, 0.5, 0.0]
    extend: [-0.8, 0.3, 0.0]
    altitude_recover: [0.0, 0.0, 0.8]
