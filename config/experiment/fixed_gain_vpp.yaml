# Experiment: Virtual Pursuit Point with fixed guidance gains
# This config is used both for training a VPP policy with frozen guidance
# gains and as a deterministic fixed-gain evaluation baseline.
experiment:
  name: fixed_gain_vpp
  seed: 0
  mode: train
  output_root: outputs

includes:
  - "../env.yaml"
  - "../guidance.yaml"
  - "../ppo.yaml"
  - "../reward.yaml"

env:
  backend: simple
  use_jsbsim: false
  decision_freq: 5
  sim_freq: 60
  max_high_level_steps: 512
  high_level_dt: 0.2
  target_mode: constant_velocity

  # Termination thresholds (loose, as a fixed-gain prior)
  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 12000.0

guidance:
  mode: los_rate
  use_gain_adapter: false
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    k_energy: 0.1
    alpha_filter: 0.3
  params:
    # Distance-aware throttle slows the aircraft to the target's speed as it
    # approaches the virtual point, preventing the overshoot that makes a
    # fixed-gain baseline fail.
    use_distance_aware_speed: true
    target_speed_mps: 200.0
    distance_scale_m: 2000.0
    speed_error_scale_mps: 100.0
    base_throttle: 0.7
  virtual_point:
    enabled: true
    anchor_mode: current_target

trajectory_prediction:
  enabled: false

virtual_point:
  anchor_mode: current_target
  return_info: true
  action_dim: 3
  d_long_range: [-1500.0, 1500.0]
  d_lat_range: [-800.0, 800.0]
  d_vert_range: [-500.0, 500.0]
  smoothing_alpha: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0

reward:
  w_range: 0.6
  w_angle: 0.9
  w_energy: 0.0
  w_safety: 3.0
  w_saturation: 0.5
  w_smooth: 0.2
  w_turn_rate: 0.5
  w_closing: 0.1
  w_alive: 0.02
  w_overshoot: 1.0
  ideal_range_min: 700.0
  ideal_range_max: 1100.0
  terminal_success: 400.0
  terminal_failure: -300.0
  terminal_crash: -600.0

policy:
  type: mlp
  hidden_sizes: [256, 256, 128]
  activation: relu
  action_dim: 3
  action_low: [-1.0, -1.0, -1.0]
  action_high: [1.0, 1.0, 1.0]

ppo:
  device: cpu
  total_timesteps: 5_000_000
  rollout_steps: 1024
  minibatch_size: 256
  update_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.001
  learning_rate: 3.0e-4
  max_grad_norm: 0.5
  normalize_advantage: true

evaluation:
  eval_interval: 100000
  eval_episodes: 10
  seeds: [0, 1, 2]
  save_trajectories: true

checkpoint:
  save_interval: 100000
  save_best: true
  save_last: true

scenarios:
  favorable:
    name: favorable
    description: "Ego starts behind target at close range with a modest speed advantage."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 0.0
    target_init:
      position_m: [800.0, 0.0, 5000.0]
      velocity_mps: 190.0
      heading_deg: 0.0

  neutral:
    name: neutral
    description: "Ego and target start head-on at similar speed and altitude."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 180.0

  disadvantage:
    name: disadvantage
    description: "Target starts offset behind ego; ego must perform lead turn."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [-600.0, 400.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 30.0

  challenging:
    name: challenging
    description: "Target starts at high lateral offset with crossing trajectory."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 45.0
    target_init:
      position_m: [1500.0, 1500.0, 5200.0]
      velocity_mps: 210.0
      heading_deg: 225.0
