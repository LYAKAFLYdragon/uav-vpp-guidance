# No-Prediction VPP Baseline — JSBSim High-Fidelity Bridge Configuration

includes:
  - ../env.yaml
  - ../ppo.yaml
  - ../guidance.yaml
  - ../reward.yaml

experiment:
  name: no_prediction_vpp_jsbsim
  seed: 0
  mode: eval
  output_root: outputs

# Backend selection
backend: jsbsim

env:
  use_jsbsim: true
  aircraft_model: f16
  legacy_project_root: "E:/CloseAirCombat_control"
  origin: [120.0, 60.0, 0.0]

  # Time stepping
  sim_freq: 60
  decision_freq: 5
  high_level_dt: 0.2
  low_level_dt: 0.0166667
  action_repeat: 12
  max_high_level_steps: 512

  # Target behavior
  target_mode: constant_velocity

  # Termination thresholds
  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 8000.0

# Trajectory prediction (disabled for baseline)
trajectory_prediction:
  enabled: false

virtual_point:
  anchor_mode: current_target
  action_dim: 3
  d_long_range: [-1500.0, 1500.0]
  d_lat_range: [-800.0, 800.0]
  d_vert_range: [-500.0, 500.0]
  smoothing_alpha: 0.3

guidance:
  mode: los_rate
  use_gain_adapter: false
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    alpha_filter: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0

reward:
  w_range: 0.5
  w_angle: 0.8
  w_energy: 0.2
  w_safety: 2.0
  w_saturation: 1.0
  w_smooth: 0.1
  terminal_success: 200.0
  terminal_failure: -200.0
  terminal_crash: -300.0
  min_altitude_m: 500.0

training:
  total_steps: 10000
  rollout_steps: 512
  eval_interval: 2000
  save_interval: 5000

evaluation:
  episodes: 10
  scenario_types:
    - favorable
    - neutral
    - disadvantage
    - challenging

scenarios:
  favorable:
    name: favorable
    description: "Ego starts behind target at similar altitude with speed advantage."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 0.0
      pitch_deg: 0.0
      roll_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0
      pitch_deg: 0.0
      roll_deg: 0.0

  neutral:
    name: neutral
    description: "Ego and target start head-on at similar speed and altitude."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
      pitch_deg: 0.0
      roll_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 180.0
      pitch_deg: 0.0
      roll_deg: 0.0

  disadvantage:
    name: disadvantage
    description: "Target starts behind ego with speed advantage."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0
      pitch_deg: 0.0
      roll_deg: 0.0
    target_init:
      position_m: [-2000.0, 0.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 0.0
      pitch_deg: 0.0
      roll_deg: 0.0

  challenging:
    name: challenging
    description: "Target starts at high lateral offset with crossing trajectory."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 45.0
      pitch_deg: 0.0
      roll_deg: 0.0
    target_init:
      position_m: [1500.0, 1500.0, 5200.0]
      velocity_mps: 210.0
      heading_deg: 225.0
      pitch_deg: 0.0
      roll_deg: 0.0
