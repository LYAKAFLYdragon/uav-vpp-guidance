# Stage 6F.5A: Feasible Geometry Re-Ablation Configuration
#
# Fixes the favorable/disadvantage scenario geometry that was universally fatal
# in Stage 6F.4 (0% success across all methods).
#
# Changes from Stage 6F:
#   - max_range_m increased from 8000 -> 12000 m to allow tail-chase closure
#   - favorable: reduced initial separation (2000m -> 800m) and increased speed advantage
#   - disadvantage: reduced initial separation (2000m -> 600m), added lateral offset
#     to prevent pure stern chase, and allowed head-on intercept geometry
#   - neutral & challenging: preserved from Stage 6F (they worked)

includes:
  - ../env.yaml
  - ../ppo.yaml
  - ../guidance.yaml
  - ../reward.yaml

experiment:
  name: stage6f5_feasible_geometry
  seed: 0
  mode: eval
  output_root: outputs

env:
  backend: simple
  use_jsbsim: false
  decision_freq: 5
  sim_freq: 60
  max_high_level_steps: 512
  high_level_dt: 0.2
  target_mode: constant_velocity

  # Termination thresholds
  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 12000.0

methods:
  no_prediction:
    name: no_prediction
    checkpoint: outputs/experiments/no_prediction_vpp_ppo/checkpoints/best.pt
    trajectory_prediction:
      enabled: false
    virtual_point:
      anchor_mode: current_target
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

  cv_prediction:
    name: cv_prediction
    checkpoint: outputs/experiments/vpp_ppo_cv_prediction/checkpoints/best.pt
    trajectory_prediction:
      enabled: true
      predictor_type: constant_velocity
      freeze_predictor_during_rl: true
      prediction:
        lookahead_time_s: 1.0
        output_mode: absolute_position
        fallback_mode: constant_velocity
      history:
        history_len: 5
        padding_mode: repeat_first
    virtual_point:
      anchor_mode: predicted_target
      return_info: true
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

  ca_prediction:
    name: ca_prediction
    checkpoint: outputs/experiments/vpp_ppo_ca_prediction/checkpoints/best.pt
    trajectory_prediction:
      enabled: true
      predictor_type: constant_acceleration
      freeze_predictor_during_rl: true
      prediction:
        lookahead_time_s: 1.0
        output_mode: absolute_position
        fallback_mode: constant_velocity
      history:
        history_len: 5
        padding_mode: repeat_first
    virtual_point:
      anchor_mode: predicted_target
      return_info: true
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

  lstm_frozen:
    name: lstm_frozen
    checkpoint: outputs/experiments/vpp_ppo_lstm_frozen/checkpoints/best.pt
    trajectory_prediction:
      enabled: true
      predictor_type: lstm
      strict_predictor_init: true
      checkpoint_strict: true
      checkpoint_path: outputs/trajectory_prediction/best_model.pt
      freeze_predictor_during_rl: true
      device: cpu
      allow_device_fallback: true
      model:
        type: lstm
        input_dim: 16
        hidden_dim: 128
        num_layers: 2
        dropout: 0.1
        predict_variance: false
      history:
        history_len: 10
        sample_rate_hz: 5
        padding_mode: repeat_first
      prediction:
        lookahead_time_s: 1.0
        output_mode: relative_displacement
        fallback_mode: constant_velocity
      integration:
        anchor_mode: predicted_target
        add_prediction_to_observation: false
        add_uncertainty_to_observation: false
      normalization:
        position_scale_m: 1000.0
        velocity_scale_mps: 300.0
        angle_mode: sin_cos
        overload_scale: 9.0
    virtual_point:
      anchor_mode: predicted_target
      return_info: true
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

  gru_frozen:
    name: gru_frozen
    checkpoint: outputs/experiments/vpp_ppo_gru_frozen/checkpoints/best.pt
    trajectory_prediction:
      enabled: true
      predictor_type: gru
      strict_predictor_init: true
      checkpoint_strict: true
      checkpoint_path: outputs/trajectory_prediction/best_model_gru.pt
      freeze_predictor_during_rl: true
      device: cpu
      allow_device_fallback: true
      model:
        type: gru
        input_dim: 16
        hidden_dim: 128
        num_layers: 2
        dropout: 0.1
        predict_variance: false
      history:
        history_len: 10
        sample_rate_hz: 5
        padding_mode: repeat_first
      prediction:
        lookahead_time_s: 1.0
        output_mode: relative_displacement
        fallback_mode: constant_velocity
      integration:
        anchor_mode: predicted_target
        add_prediction_to_observation: false
        add_uncertainty_to_observation: false
      normalization:
        position_scale_m: 1000.0
        velocity_scale_mps: 300.0
        angle_mode: sin_cos
        overload_scale: 9.0
    virtual_point:
      anchor_mode: predicted_target
      return_info: true
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

guidance:
  mode: los_rate
  use_gain_adapter: false
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    alpha_filter: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0

reward:
  w_range: 0.5
  w_angle: 0.8
  w_energy: 0.2
  w_safety: 2.0
  w_saturation: 1.0
  w_smooth: 0.1
  terminal_success: 200.0
  terminal_failure: -200.0
  terminal_crash: -300.0
  min_altitude_m: 500.0

policy:
  type: mlp
  hidden_sizes: [128, 128]
  activation: tanh
  action_dim: 3
  action_low: [-1.0, -1.0, -1.0]
  action_high: [1.0, 1.0, 1.0]

scenarios:
  favorable:
    name: favorable
    description: "Ego starts behind target at close range with strong speed advantage."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 250.0
      heading_deg: 0.0
    target_init:
      position_m: [800.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0
    metadata:
      scenario_name: favorable
      initial_range_m: 800.0
      closure_rate_mps: 70.0
      expected_feasible: true
      rationale: "High closure rate (70 m/s) from close range (800m). Ego catches target in ~12s before range can diverge."

  neutral:
    name: neutral
    description: "Ego and target start head-on at similar speed and altitude."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 180.0
    metadata:
      scenario_name: neutral
      initial_range_m: 2000.0
      closure_rate_mps: 400.0
      expected_feasible: true
      rationale: "Head-on closure rate 400 m/s guarantees rapid intercept regardless of guidance."

  disadvantage:
    name: disadvantage
    description: "Target starts offset behind ego; ego must perform lead turn."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [-600.0, 400.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 30.0
    metadata:
      scenario_name: disadvantage
      initial_range_m: 721.1
      closure_rate_mps: 30.0
      expected_feasible: marginal
      rationale: "Reduced separation (600m) with lateral offset prevents pure stern chase. Target heading 30deg creates crossing component. Ego must perform lead turn; marginal due to low closure rate."

  challenging:
    name: challenging
    description: "Target starts at high lateral offset with crossing trajectory."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 45.0
    target_init:
      position_m: [1500.0, 1500.0, 5200.0]
      velocity_mps: 210.0
      heading_deg: 225.0
    metadata:
      scenario_name: challenging
      initial_range_m: 2121.3
      closure_rate_mps: 350.0
      expected_feasible: true
      rationale: "Crossing geometry with high closure rate. LSTM/GRU excelled here in Stage 6F.4 (100%/67%)."
