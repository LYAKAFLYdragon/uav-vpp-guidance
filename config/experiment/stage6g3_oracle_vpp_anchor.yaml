# Stage 6G.3A: Oracle VPP Anchor Probe
#
# Question: If the VPP anchor were placed at the target's TRUE future position
# (perfect prediction), would success rate improve?
#
# Implementation: Uses anchor_mode="oracle_future_position" which computes
# target_pos + target_vel * lookahead_time (perfect constant-velocity oracle).
#
# This is equivalent to perfect prediction with zero error.

includes:
  - ../env.yaml
  - ../ppo.yaml
  - ../guidance.yaml
  - ../reward.yaml

experiment:
  name: stage6g3_oracle_vpp_anchor
  seed: 0
  mode: eval
  output_root: outputs

env:
  backend: simple
  use_jsbsim: false
  decision_freq: 5
  sim_freq: 60
  max_high_level_steps: 512
  high_level_dt: 0.2
  target_mode: constant_velocity

  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 12000.0

methods:
  oracle_vpp_anchor:
    name: oracle_vpp_anchor
    # Oracle mode does not require a trained policy checkpoint;
    # it uses the oracle anchor directly. For compatibility with
    # the evaluation harness, use --allow-random-policy or provide
    # a dummy checkpoint path.
    checkpoint: outputs/experiments/no_prediction_vpp_ppo_seed0/checkpoints/best.pt
    trajectory_prediction:
      enabled: false
    virtual_point:
      anchor_mode: oracle_future_position
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

guidance:
  mode: los_rate
  use_gain_adapter: false
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    alpha_filter: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0

scenarios:
  favorable:
    name: favorable
    description: "Ego starts behind target at close range with strong speed advantage."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 280.0
      heading_deg: 0.0
    target_init:
      position_m: [800.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0

  neutral:
    name: neutral
    description: "Ego and target start head-on at similar speed and altitude."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 180.0

  disadvantage:
    name: disadvantage
    description: "Target starts offset behind ego; ego must perform lead turn."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [-600.0, 400.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 30.0

  challenging:
    name: challenging
    description: "Target starts at high lateral offset with crossing trajectory."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 45.0
    target_init:
      position_m: [1500.0, 1500.0, 5200.0]
      velocity_mps: 210.0
      heading_deg: 225.0
