# Stage 6G.3B: Rule-Based VPP Pursuit Probe
#
# Question: If we bypass the learned PPO policy and use a rule-based
# VPP placement (pure pursuit with fixed lead angle), do any guidance
# laws succeed in tail-chase geometry?
#
# Implementation: anchor_mode="rule_based_pursuit" places VPP ahead
# of target along the LOS by lead_distance_m.

includes:
  - ../env.yaml
  - ../ppo.yaml
  - ../guidance.yaml
  - ../reward.yaml

experiment:
  name: stage6g3_rule_based_pursuit
  seed: 0
  mode: eval
  output_root: outputs

env:
  backend: simple
  use_jsbsim: false
  decision_freq: 5
  sim_freq: 60
  max_high_level_steps: 512
  high_level_dt: 0.2
  target_mode: constant_velocity

  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 12000.0

methods:
  rule_based_pursuit_500m:
    name: rule_based_pursuit_500m
    checkpoint: outputs/experiments/no_prediction_vpp_ppo_seed0/checkpoints/best.pt
    trajectory_prediction:
      enabled: false
    virtual_point:
      anchor_mode: rule_based_pursuit
      lead_distance_m: 500.0
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

  rule_based_pursuit_1000m:
    name: rule_based_pursuit_1000m
    checkpoint: outputs/experiments/no_prediction_vpp_ppo_seed0/checkpoints/best.pt
    trajectory_prediction:
      enabled: false
    virtual_point:
      anchor_mode: rule_based_pursuit
      lead_distance_m: 1000.0
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

guidance:
  mode: los_rate
  use_gain_adapter: false
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    alpha_filter: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0

scenarios:
  favorable:
    name: favorable
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 250.0
      heading_deg: 0.0
    target_init:
      position_m: [800.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0

  disadvantage:
    name: disadvantage
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [-600.0, 400.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 30.0
