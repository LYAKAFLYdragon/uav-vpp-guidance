# Stage 6G.5A: Wide Geometry Sweep Smoke
#
# Purpose: Sample 30–50 points from a 324-combo geometry grid to find
# any feasible tail-chase / stern-conversion region before committing
# to full sweep or bilevel gain optimization.
#
# Grid: 3×3×3×4×3 = 324 combinations
#   - initial_range_m: [1200, 2000, 3200]
#   - ego_speed_mps: [220, 280, 340]
#   - target_speed_mps: [120, 160, 200]
#   - aspect_angle_deg: [0, 30, 60, 90]
#   - altitude_diff_m: [-500, 0, 500]

includes:
  - ../env.yaml
  - ../ppo.yaml
  - ../guidance.yaml
  - ../reward.yaml

experiment:
  name: stage6g5_wide_geometry_smoke
  seed: 0
  mode: eval
  output_root: outputs

env:
  backend: simple
  use_jsbsim: false
  decision_freq: 5
  sim_freq: 60
  max_high_level_steps: 512
  high_level_dt: 0.2
  target_mode: constant_velocity

  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 12000.0

methods:
  no_prediction:
    name: no_prediction
    checkpoint: outputs/experiments/no_prediction_vpp_ppo_seed0/checkpoints/best.pt
    trajectory_prediction:
      enabled: false
    virtual_point:
      anchor_mode: current_target
      action_dim: 3
      d_long_range: [-1500.0, 1500.0]
      d_lat_range: [-800.0, 800.0]
      d_vert_range: [-500.0, 500.0]
      smoothing_alpha: 0.3

guidance:
  mode: los_rate
  use_gain_adapter: false
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    alpha_filter: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0

# Policy architecture must match the trained checkpoint
policy:
  hidden_sizes: [128, 128]
  activation: tanh

# Full parameter grid (interpreted by runner; smoke sampling reduces to 30–50 points)
geometry_grid:
  initial_range_m: [1200, 2000, 3200]
  ego_speed_mps: [220, 280, 340]
  target_speed_mps: [120, 160, 200]
  aspect_angle_deg: [0, 30, 60, 90]
  altitude_diff_m: [-500, 0, 500]

# Base scenario template
scenario_template:
  name: geometry_sweep
  own_init:
    position_m: [0.0, 0.0, 5000.0]
    velocity_mps: 200.0
    heading_deg: 0.0
  target_init:
    position_m: [2000.0, 0.0, 5000.0]
    velocity_mps: 160.0
    heading_deg: 0.0

# Smoke defaults (overridable via CLI)
smoke_defaults:
  sample_size: 40
  sampling_method: random
  seed: 0
  episodes_per_point: 3
  eval_seeds: [0]
