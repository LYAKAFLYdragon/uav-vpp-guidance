env:
  backend: simple
  decision_freq: 5
  high_level_dt: 0.2
  hysteresis_ata_deg: 30.0
  hysteresis_range_m: 950.0
  max_altitude_m: 15000.0
  max_high_level_steps: 512
  max_range_m: 12000.0
  min_altitude_m: 500.0
  sim_freq: 60
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  success_range_m: 900.0
  target_mode: constant_velocity
  use_jsbsim: false
experiment:
  mode: eval
  name: stage6g5_wide_geometry_smoke
  output_root: outputs
  seed: 0
geometry_grid:
  altitude_diff_m:
  - -500
  - 0
  - 500
  aspect_angle_deg:
  - 0
  - 30
  - 60
  - 90
  ego_speed_mps:
  - 220
  - 280
  - 340
  initial_range_m:
  - 1200
  - 2000
  - 3200
  target_speed_mps:
  - 120
  - 160
  - 200
guidance:
  gains:
    alpha_filter: 0.3
    k_damp: 0.2
    k_los: 1.0
    k_pos: 0.5
    k_roll: 1.0
    k_speed: 0.2
  mode: los_rate
  use_gain_adapter: false
includes:
- ../env.yaml
- ../ppo.yaml
- ../guidance.yaml
- ../reward.yaml
limits:
  nz_max: 7.0
  nz_min: -2.0
  roll_rate_max: 1.5
  roll_rate_min: -1.5
  throttle_max: 1.0
  throttle_min: 0.0
methods:
  no_prediction:
    checkpoint: outputs/audit_no_pred_final/checkpoints/best.pt
    name: no_prediction
    trajectory_prediction:
      enabled: false
    virtual_point:
      action_dim: 3
      anchor_mode: current_target
      d_lat_range:
      - -800.0
      - 800.0
      d_long_range:
      - -1500.0
      - 1500.0
      d_vert_range:
      - -500.0
      - 500.0
      smoothing_alpha: 0.3
policy:
  activation: tanh
  hidden_sizes:
  - 128
  - 128
scenario_template:
  name: geometry_sweep
  own_init:
    heading_deg: 0.0
    position_m:
    - 0.0
    - 0.0
    - 5000.0
    velocity_mps: 200.0
  target_init:
    heading_deg: 0.0
    position_m:
    - 2000.0
    - 0.0
    - 5000.0
    velocity_mps: 160.0
smoke_defaults:
  episodes_per_point: 3
  eval_seeds:
  - 0
  sample_size: 40
  sampling_method: random
  seed: 0
