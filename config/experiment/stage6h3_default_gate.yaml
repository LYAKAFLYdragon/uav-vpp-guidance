# Stage 6H.3: Default frozen mode-switch gate configuration.
#
# Derived from LHS20 formal threshold optimization (seed=42, 20 samples).
# Recommended configuration: 8/20 PASS, conservative, earliest sampled.
#
# Hard constraints verified:
#   - regression baseline: 40/40 success (100%)
#   - candidate search: 40/40 success (100%)
#   - negative tail_chase: 10/10 success + 10/10 mode_switch
#   - negative fleeing: 0/10 success
#   - negative offset_attack: 0/10 success

guidance:
  mode: "los_rate"
  mode_switch:
    enabled: true
    aspect_threshold_deg: 25.0
    range_threshold_m: 3000.0
    closing_speed_threshold_mps: 80.0
    crossing_aspect_threshold_deg: null

  params:
    navigation_constant: 3.0
    los_rate_filter_alpha: 0.3
    max_accel_mps2: 100.0
    epsilon: 1.0e-6
    base_throttle: 0.7
    target_speed_mps: 250.0
    speed_error_scale_mps: 100.0
    dt: 0.2

  post_process:
    enable_terminal_protection: true
    enable_energy_compensation: true
    enable_load_roll_coordination: true

env:
  backend: "simple"
  use_jsbsim: false
  max_steps: 2000
  high_level_dt: 0.5
  limits:
    nz_min: -2.0
    nz_max: 7.0
    roll_rate_min: -1.5
    roll_rate_max: 1.5
    throttle_min: 0.0
    throttle_max: 1.0

ppo:
  network:
    hidden_size: 64
