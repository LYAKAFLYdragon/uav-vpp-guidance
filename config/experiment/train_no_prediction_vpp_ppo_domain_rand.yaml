# Stage 6D: No-Prediction VPP PPO with Domain Randomization
#
# Trains a PPO policy with curriculum-style domain randomization
# to improve robustness to initial condition perturbations.

includes:
  - ../env.yaml
  - ../ppo.yaml
  - ../guidance.yaml
  - ../reward.yaml

experiment:
  name: no_prediction_vpp_ppo_domain_rand
  seed: 0
  mode: train
  output_root: outputs

env:
  backend: simple
  use_jsbsim: false
  decision_freq: 5
  sim_freq: 60
  max_high_level_steps: 512
  high_level_dt: 0.2
  target_mode: constant_velocity

  # Termination thresholds
  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 12000.0

domain_randomization:
  enabled: true
  # Base noise magnitudes (scale directly controls effective perturbation)
  # Effective perturbation = base_value * scale
  # With scale=1.0: position ±10% range, velocity ±10%, heading ±15°
  position_noise_fraction: 0.10
  velocity_noise_fraction: 0.10
  heading_noise_deg: 15.0
  # Curriculum schedule: (progress_fraction, scale_factor)
  # scale_factor multiplies the base noise values above
  curriculum_schedule:
    - [0.00, 0.50]   # 0-25%  progress: 5%  position, 5%  velocity, 7.5°  heading
    - [0.25, 1.00]   # 25-50% progress: 10% position, 10% velocity, 15°   heading
    - [0.50, 1.50]   # 50-75% progress: 15% position, 15% velocity, 22.5° heading
    - [0.75, 2.00]   # 75-100% progress: 20% position, 20% velocity, 30°   heading
  # If fixed_scale is set, curriculum is disabled and this constant scale is used.
  # fixed_scale: 1.00

trajectory_prediction:
  enabled: false

virtual_point:
  anchor_mode: current_target
  return_info: true
  action_dim: 3
  d_long_range: [-1500.0, 1500.0]
  d_lat_range: [-800.0, 800.0]
  d_vert_range: [-500.0, 500.0]
  smoothing_alpha: 0.3

guidance:
  mode: los_rate
  use_gain_adapter: false
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    alpha_filter: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0

reward:
  w_range: 0.5
  w_angle: 0.8
  w_energy: 0.2
  w_safety: 2.0
  w_saturation: 1.0
  w_smooth: 0.1
  terminal_success: 200.0
  terminal_failure: -200.0
  terminal_crash: -300.0
  min_altitude_m: 500.0

policy:
  type: mlp
  hidden_sizes: [128, 128]
  activation: tanh
  action_dim: 3
  action_low: [-1.0, -1.0, -1.0]
  action_high: [1.0, 1.0, 1.0]

ppo:
  total_timesteps: 200000
  rollout_steps: 2048
  minibatch_size: 256
  update_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  learning_rate: 3.0e-4
  max_grad_norm: 0.5
  normalize_advantage: true
  device: cuda

evaluation:
  eval_interval: 10000
  eval_episodes: 10
  seeds: [0, 1, 2]
  save_trajectories: true

checkpoint:
  save_interval: 10000
  save_best: true
  save_last: true

scenarios:
  favorable:
    name: favorable
    description: "Ego starts behind target at close range with strong speed advantage."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 280.0
      heading_deg: 0.0
    target_init:
      position_m: [800.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0

  neutral:
    name: neutral
    description: "Ego and target start head-on at similar speed and altitude."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 180.0

  disadvantage:
    name: disadvantage
    description: "Target starts offset behind ego; ego must perform lead turn."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [-600.0, 400.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 30.0

  challenging:
    name: challenging
    description: "Target starts at high lateral offset with crossing trajectory."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 45.0
    target_init:
      position_m: [1500.0, 1500.0, 5200.0]
      velocity_mps: 210.0
      heading_deg: 225.0
