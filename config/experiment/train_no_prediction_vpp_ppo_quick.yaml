checkpoint:
  save_best: true
  save_interval: 2500
  save_last: true
env:
  backend: simple
  decision_freq: 5
  high_level_dt: 0.2
  hysteresis_ata_deg: 30.0
  hysteresis_range_m: 950.0
  max_altitude_m: 15000.0
  max_high_level_steps: 512
  max_range_m: 12000.0
  min_altitude_m: 500.0
  sim_freq: 60
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  success_range_m: 900.0
  target_mode: constant_velocity
  use_jsbsim: false
evaluation:
  eval_episodes: 10
  eval_interval: 2500
  save_trajectories: true
  seeds:
  - 0
  - 1
  - 2
experiment:
  mode: train
  name: no_prediction_vpp_ppo
  output_root: outputs
  seed: 0
guidance:
  gains:
    alpha_filter: 0.3
    k_damp: 0.2
    k_los: 1.0
    k_pos: 0.5
    k_roll: 1.0
    k_speed: 0.2
  mode: los_rate
  use_gain_adapter: false
includes:
- ../env.yaml
- ../ppo.yaml
- ../guidance.yaml
- ../reward.yaml
limits:
  nz_max: 7.0
  nz_min: -2.0
  roll_rate_max: 1.5
  roll_rate_min: -1.5
  throttle_max: 1.0
  throttle_min: 0.0
policy:
  action_dim: 3
  action_high:
  - 1.0
  - 1.0
  - 1.0
  action_low:
  - -1.0
  - -1.0
  - -1.0
  activation: tanh
  hidden_sizes:
  - 128
  - 128
  type: mlp
ppo:
  clip_coef: 0.2
  device: cpu
  entropy_coef: 0.01
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 0.0003
  max_grad_norm: 0.5
  minibatch_size: 256
  normalize_advantage: true
  rollout_steps: 512
  total_timesteps: 5000
  update_epochs: 10
  value_coef: 0.5
reward:
  min_altitude_m: 500.0
  terminal_crash: -300.0
  terminal_failure: -200.0
  terminal_success: 200.0
  w_angle: 0.8
  w_energy: 0.2
  w_range: 0.5
  w_safety: 2.0
  w_saturation: 1.0
  w_smooth: 0.1
scenarios:
  favorable:
    name: favorable
    description: "Ego starts behind target at close range with strong speed advantage."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 280.0
      heading_deg: 0.0
    target_init:
      position_m: [800.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0

  neutral:
    name: neutral
    description: "Ego and target start head-on at similar speed and altitude."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 180.0

  disadvantage:
    name: disadvantage
    description: "Target starts offset behind ego; ego must perform lead turn."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [-600.0, 400.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 30.0

  challenging:
    name: challenging
    description: "Target starts at high lateral offset with crossing trajectory."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 45.0
    target_init:
      position_m: [1500.0, 1500.0, 5200.0]
      velocity_mps: 210.0
      heading_deg: 225.0
