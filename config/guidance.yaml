virtual_point:
  action_dim: 3
  d_long_range: [-1500.0, 1500.0]
  d_lat_range: [-800.0, 800.0]
  d_vert_range: [-500.0, 500.0]
  tau_pred_range: [0.0, 3.0]
  speed_bias_range: [-80.0, 80.0]
  smoothing_alpha: 0.3

guidance:
  mode: los_rate
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    k_energy: 0.1
    alpha_filter: 0.3

  # LOS-rate guidance parameters (previously hard-coded magic numbers)
  params:
    # Distance scaling for nz_cmd proportional term (m)
    distance_scale_m: 2000.0
    # Target speed reference for throttle logic (m/s)
    target_speed_mps: 250.0
    # Speed error scaling denominator for throttle (m/s)
    speed_error_scale_mps: 100.0
    # Base throttle command (0-1)
    base_throttle: 0.7
    # Epsilon for division / singularity protection (m and m/s)
    epsilon: 1.0e-9
    # Base normal overload (1g = level flight)
    base_nz: 1.0
    # Capture radius: when distance to VPP is below this, blend to level flight
    capture_radius_m: 50.0
    # Terminal boundary layer: suppress high-gain LOS commands near the VPP
    # to avoid the collision singularity (R -> 0) in crossing geometries.
    terminal_boundary_layer:
      enabled: true
      R_dead_m: 500.0
      blend_scale: 125.0
    # Internal clipping guard (defense in depth)
    enable_internal_clip: true
    # Internal first-order filter (disable if caller already filters)
    enable_internal_filter: false

    # Proportional Navigation parameters
    navigation_constant: 3.0
    los_rate_filter_alpha: 0.3
    max_accel_mps2: 100.0

    # Hybrid guidance parameters
    hybrid_mode: range            # 'range' | 'energy' | 'blended'
    range_threshold_m: 3000.0
    blend_transition_m: 1000.0
    energy_speed_threshold_mps: 220.0
    hysteresis_m: 500.0
    energy_speed_hysteresis_mps: 20.0
    min_dwell_steps: 3

    # Mode-switch gate: switch to proportional navigation for tail-chase / head-on
  # geometries where LOS-rate guidance struggles (Stage 6H.1 verified)
  mode_switch:
    enabled: true
    aspect_threshold_deg: 25.0
    range_threshold_m: 3000.0
    closing_speed_threshold_mps: 50.0

  # Command post-processing
  post_process:
    enabled: false
    enable_energy_compensation: false
    energy_k_nz: 0.05
    energy_k_speed: 0.01
    enable_load_roll_coordination: false
    coord_nz_threshold: 0.8
    coord_roll_scale: 0.5
    enable_terminal_protection: true
    terminal_range_m: 500.0
    terminal_nz_scale: 0.7
    terminal_roll_scale: 0.8

  limits:
    nz_min: -2.0
    nz_max: 7.0
    roll_rate_min: -1.5
    roll_rate_max: 1.5
    throttle_min: 0.0
    throttle_max: 1.0

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0
