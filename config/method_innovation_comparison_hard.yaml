# Harder comparison config for method-innovation validation.
# Difficulty levers vs. method_innovation_comparison.yaml:
#   - target_mode: sinusoidal (weaving target, non-zero lateral acceleration)
#   - 6 scenarios covering tail-chase, head-on, crossing, and disadvantage
#     geometries, with varying initial energy and offset.
# All other hyperparameters are identical to the standard comparison config.

includes:
  - env.yaml
  - ppo.yaml
  - guidance.yaml
  - reward.yaml

experiment:
  name: method_innovation_comparison_hard
  seed: 0
  mode: train
  output_root: outputs

env:
  backend: simple
  use_jsbsim: false
  decision_freq: 5
  sim_freq: 60
  max_high_level_steps: 512
  high_level_dt: 0.2
  target_mode: sinusoidal
  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 12000.0

curriculum:
  stages:
    - [0.25, ["tail_chase", "head_on"]]
    - [0.50, ["tail_chase", "head_on", "crossing_close"]]
    - [0.75, ["tail_chase", "head_on", "crossing_close", "disadvantage"]]
    - [1.00, ["tail_chase", "head_on", "crossing_close", "disadvantage", "crossing_far", "weaving_pursuit"]]
  stage_gate_sr: 0.40

trajectory_prediction:
  enabled: false

virtual_point:
  anchor_mode: current_target
  return_info: true
  action_dim: 3
  d_long_range: [-1500.0, 1500.0]
  d_lat_range: [-800.0, 800.0]
  d_vert_range: [-500.0, 500.0]
  smoothing_alpha: 0.3

guidance:
  mode: los_rate
  use_gain_adapter: false
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    alpha_filter: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0

# Actuator dynamics: injects lag / delay / rate limits between guidance
# command and aircraft dynamics.
actuator_dynamics:
  enabled: true
  tau_s:
    nz_cmd: 0.2
    roll_rate_cmd: 0.15
    throttle_cmd: 0.1
  delay_steps: 1
  rate_limit_per_s:
    nz_cmd: 35.0
    roll_rate_cmd: 7.5
    throttle_cmd: 2.0
  apply_saturation: true

reward:
  w_range: 0.5
  w_angle: 0.8
  w_energy: 0.2
  w_safety: 2.0
  w_saturation: 1.0
  w_smooth: 0.1
  terminal_success: 200.0
  terminal_failure: -200.0
  terminal_crash: -300.0
  min_altitude_m: 500.0
  potential_based_shaping:
    enabled: true
    C: 0.001
    gamma: 0.99

policy:
  type: mlp
  hidden_sizes: [128, 128]
  activation: tanh
  action_dim: 3
  action_low: [-1.0, -1.0, -1.0]
  action_high: [1.0, 1.0, 1.0]

ppo:
  total_timesteps: 50000
  rollout_steps: 2048
  minibatch_size: 256
  update_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  learning_rate: 3.0e-4
  max_grad_norm: 0.5
  normalize_advantage: true
  device: cpu

evaluation:
  eval_interval: 2048
  eval_episodes: 20
  seeds: [0, 1, 2, 3, 4]
  save_trajectories: false

checkpoint:
  save_interval: 5000
  save_best: true
  save_last: true

scenarios:
  tail_chase:
    name: tail_chase
    description: "Close-range tail chase with weaving target."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 240.0
      heading_deg: 0.0
    target_init:
      position_m: [600.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0

  head_on:
    name: head_on
    description: "Head-on engagement with moderate range and weaving."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 180.0

  crossing_close:
    name: crossing_close
    description: "Close crossing geometry with lateral offset."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 210.0
      heading_deg: 30.0
    target_init:
      position_m: [1200.0, 800.0, 5050.0]
      velocity_mps: 200.0
      heading_deg: 210.0

  crossing_far:
    name: crossing_far
    description: "Far crossing geometry requiring longer approach."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 45.0
    target_init:
      position_m: [2500.0, 2200.0, 5200.0]
      velocity_mps: 210.0
      heading_deg: 225.0

  disadvantage:
    name: disadvantage
    description: "Target behind ownship, faster and weaving."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 190.0
      heading_deg: 0.0
    target_init:
      position_m: [-400.0, 250.0, 5000.0]
      velocity_mps: 230.0
      heading_deg: 20.0

  weaving_pursuit:
    name: weaving_pursuit
    description: "Pursuit of a weaving target with energy disadvantage."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 210.0
      heading_deg: 0.0
    target_init:
      position_m: [1500.0, 0.0, 5000.0]
      velocity_mps: 210.0
      heading_deg: 180.0
