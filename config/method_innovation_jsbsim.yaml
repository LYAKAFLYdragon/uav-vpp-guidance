# Unified JSBSim comparison config for Method Innovation Track 1 vs Track 2.
# All algorithms (Baseline PPO, CR-PPO, Intentional PPO and ablations)
# share the same JSBSim environment, network, curriculum, and base PPO hyperparams.
includes:
  - env.yaml
  - ppo.yaml
  - guidance.yaml
  - reward.yaml

experiment:
  name: method_innovation_jsbsim
  seed: 0
  mode: train
  output_root: outputs

# Backend selection — JSBSIM ONLY
backend: jsbsim

env:
  use_jsbsim: true
  strict_backend: true        # Never fall back to simple
  aircraft_model: f16
  origin: [120.0, 60.0, 0.0]  # JSBSim geodetic origin

  # Time stepping — JSBSim-specific
  sim_freq: 60
  decision_freq: 5
  high_level_dt: 0.2
  low_level_dt: 0.0166667      # 1/60, JSBSim integration step
  action_repeat: 12             # sim_freq // decision_freq
  max_high_level_steps: 512

  target_mode: constant_velocity

  # Termination thresholds (same as simple config)
  success_range_m: 900.0
  success_ata_deg: 25.0
  success_hold_time_s: 0.2
  hysteresis_range_m: 950.0
  hysteresis_ata_deg: 30.0
  min_altitude_m: 500.0
  max_altitude_m: 15000.0
  max_range_m: 12000.0

# Actuator dynamics: DISABLED in JSBSim mode
# JSBSim F-16 already has realistic control surface rate limits and delays.
actuator_dynamics:
  enabled: false
  tau_s:
    nz_cmd: 0.2
    roll_rate_cmd: 0.15
    throttle_cmd: 0.1
  delay_steps: 1
  rate_limit_per_s:
    nz_cmd: 35.0
    roll_rate_cmd: 7.5
    throttle_cmd: 2.0
  apply_saturation: true

# Enable VPP prediction for crossing scenarios
dynamics_aware: true

trajectory_prediction:
  enabled: false

virtual_point:
  anchor_mode: current_target
  return_info: true
  action_dim: 3
  d_long_range: [-1500.0, 1500.0]
  d_lat_range: [-800.0, 800.0]
  d_vert_range: [-500.0, 500.0]
  smoothing_alpha: 0.3

guidance:
  mode: los_rate
  use_gain_adapter: false
  gains:
    k_los: 1.0
    k_pos: 0.5
    k_damp: 0.2
    k_roll: 1.0
    k_speed: 0.2
    alpha_filter: 0.3

limits:
  nz_min: -2.0
  nz_max: 7.0
  roll_rate_min: -1.5
  roll_rate_max: 1.5
  throttle_min: 0.0
  throttle_max: 1.0

reward:
  w_range: 0.5
  w_angle: 0.8
  w_energy: 0.2
  w_safety: 2.0
  w_saturation: 1.0
  w_smooth: 0.1
  w_turn_rate: 0.3
  w_closing: 0.0
  w_alive: 0.0
  w_overshoot: 0.0
  w_boundary: 0.0
  terminal_success: 200.0
  terminal_failure: -200.0
  terminal_crash: -300.0
  min_altitude_m: 500.0

  # Reward fixes for JSBSim backend
  # Old angle_reward = -(ata + aa) / 180 had no physical meaning and could be positive.
  # New formula uses max(ata, aa) to guarantee monotonic mapping to [-w_angle, 0].
  angle_reward_formula: "max_ata_aa"

  # Turn-rate penalty: avoid punishing crossing scenarios at close range.
  turn_rate_penalty:
    enabled: true
    range_min_m: 1000.0        # Exempt very close range (crossing passes)
    range_max_m: 3000.0
    heading_error_threshold_deg: 60.0
    require_closing: true      # Only penalize if range_rate < 0 (closing)

  potential_based_shaping:
    enabled: true
    C: 0.001
    gamma: 0.99

policy:
  type: mlp
  hidden_sizes: [128, 128]
  activation: tanh
  action_dim: 3
  action_low: [-1.0, -1.0, -1.0]
  action_high: [1.0, 1.0, 1.0]

ppo:
  total_timesteps: 50000
  rollout_steps: 2048
  minibatch_size: 256
  update_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  learning_rate: 3.0e-4
  max_grad_norm: 0.5
  normalize_advantage: true
  device: cpu

evaluation:
  eval_interval: 2048
  eval_episodes: 10
  seeds: [0, 1, 2]
  save_trajectories: false
  domain_rand_scale: 0.30
  eval_episodes_per_scenario: 20

checkpoint:
  save_interval: 5000
  save_best: true
  save_last: true

curriculum:
  stages:
    - [0.25, ["favorable", "neutral"]]
    - [0.50, ["favorable", "neutral", "disadvantage"]]
    - [0.75, ["favorable", "neutral", "disadvantage", "challenging"]]
    - [1.00, ["favorable", "neutral", "disadvantage", "challenging"]]
  stage_gate_sr: 0.50          # May need adjustment to 0.40 for early JSBSim stages

scenarios:
  favorable:
    name: favorable
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 280.0
      heading_deg: 0.0
    target_init:
      position_m: [800.0, 0.0, 5000.0]
      velocity_mps: 180.0
      heading_deg: 0.0

  neutral:
    name: neutral
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [2000.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 180.0

  disadvantage:
    name: disadvantage
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 0.0
    target_init:
      position_m: [-600.0, 400.0, 5000.0]
      velocity_mps: 220.0
      heading_deg: 30.0

  challenging:
    name: challenging
    description: "Crossing geometry with high lateral offset."
    own_init:
      position_m: [0.0, 0.0, 5000.0]
      velocity_mps: 200.0
      heading_deg: 45.0
    target_init:
      position_m: [1500.0, 1500.0, 5200.0]
      velocity_mps: 210.0
      heading_deg: 225.0
