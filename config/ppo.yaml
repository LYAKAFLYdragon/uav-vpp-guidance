ppo:
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  entropy_coef: 1.0e-3
  rollout_steps: 1024
  minibatch_size: 256
  update_epochs: 10
  value_coef: 0.5
  max_grad_norm: 0.5
  normalize_advantage: true
  device: cuda
  seed: 0

policy:
  hidden_sizes: [256, 256, 128]
  activation: relu
